version: '3.8'

services:

  mysql:
    image: mysql:8.4
    container_name: tripnest-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 1299

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  eureka-server:
    build: ./server
    container_name: eureka-server

    ports:
      - "8761:8761"

    depends_on:
      - mysql

  api-gateway:
    build: ./gateway
    container_name: api-gateway

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8080:8080"

    depends_on:
      - eureka-server

  hotel-service:
    build: ./hotel
    container_name: hotel-service

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8081:8081"

    depends_on:
      - mysql
      - eureka-server

  flight-service:
    build: ./flight
    container_name: flight-service

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8082:8082"

    depends_on:
      - mysql
      - eureka-server

  user-service:
    build: ./user
    container_name: user-service

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8083:8083"

    depends_on:
      - mysql
      - eureka-server

  booking-service:
    build: ./booking
    container_name: booking-service

    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8084:8084"

    depends_on:
      - mysql
      - eureka-server

volumes:
  mysql-data:
server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: hotel-service
          uri: lb://HOTEL-SERVICE
          predicates:
            - "Path=/hotels/**"

        - id: flight-service
          uri: lb://FLIGHT-SERVICE
          predicates:
            - "Path=/flights/**"

        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - "Path=/users/**"

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - "Path=/bookings/**"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: TRACE
server:
  port: 8081

spring:
  application:
    name: hotel-service
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1299
  jpa:
    hibernate:
      ddl-auto: update  
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

